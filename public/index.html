<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VideoMaster Downloader - Descarga videos y MP3</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="container">
    <header>
      <h1><i class="fas fa-download"></i> VideoMaster Downloader</h1>
      <p class="subtitle">Descarga videos y audio de YouTube en múltiples formatos y calidades</p>
    </header>

    <div class="main-card">
      <!-- Input URL -->
      <div class="input-group">
        <label><i class="fas fa-link"></i> URL del video (YouTube)</label>
        <input type="text" id="urlInput" placeholder="https://www.youtube.com/watch?v=...">
        <button id="analyzeBtn" class="btn-primary">
          <i class="fas fa-search"></i> Analizar video
        </button>
      </div>

      <!-- Loading -->
      <div id="loading" class="loading hidden">
        <div class="spinner"></div>
        <p>Analizando video...</p>
      </div>

      <!-- Video Info -->
      <div id="videoInfo" class="video-info hidden">
        <img id="thumbnail" src="" alt="Thumbnail">
        <div class="info-details">
          <h3 id="videoTitle"></h3>
          <p><i class="far fa-clock"></i> Duración: <span id="duration"></span></p>
        </div>
      </div>

      <!-- Formatos -->
      <div id="formatSection" class="format-section hidden">
        <div class="format-group">
          <label><i class="fas fa-film"></i> Formato</label>
          <select id="formatSelect">
            <option value="mp4">MP4 (Video) - RECOMENDADO</option>
            <option value="mp3">MP3 (Audio) - RECOMENDADO</option>
            <option value="webm">WEBM (Video)</option>
          </select>
        </div>

        <div class="format-group">
          <label><i class="fas fa-chart-line"></i> Calidad</label>
          <select id="qualitySelect"></select>
          <div class="whatsapp-tip" id="whatsappTip" style="display: none;">
            <i class="fab fa-whatsapp"></i>
            <span>📱 Opción optimizada para WhatsApp - Tamaño reducido y compatible</span>
          </div>
        </div>

        <button id="downloadBtn" class="btn-download">
          <i class="fas fa-arrow-down"></i> Descargar ahora
        </button>
      </div>

      <!-- Barra de progreso -->
      <div id="progressSection" class="progress-section hidden">
        <div class="progress-bar">
          <div id="progressFill" class="progress-fill"></div>
        </div>
        <p id="progressText">0%</p>
      </div>
    </div>

    <!-- Historial -->
    <div class="history-card">
      <h3><i class="fas fa-history"></i> Historial de descargas</h3>
      <div id="historyList" class="history-list">
        <p class="empty-history">No hay descargas recientes</p>
      </div>
    </div>
  <script src="script.js"></script>
</body>
</html>
